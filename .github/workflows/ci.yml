name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure default build
        run: cmake -S . -B build

      - name: Build default target
        run: cmake --build build --config Debug

      - name: Run smoke tests
        run: ctest --test-dir build -C Debug --output-on-failure

  # Windows is WhatsUI's supported preview platform.  MSVC provides
  # AddressSanitizer but does not provide UBSan; the Linux/Clang job below
  # covers the combined ASan+UBSan contract with the same headless test suite.
  windows-asan:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MSVC AddressSanitizer build
        run: cmake -S . -B build-asan -DWHATSUI_ENABLE_SANITIZERS=ON

      - name: Build MSVC AddressSanitizer targets
        run: cmake --build build-asan --config Debug

      - name: Run MSVC AddressSanitizer tests
        run: ctest --test-dir build-asan -C Debug --output-on-failure

  release-package:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: Core
            with_whatscanvas: 'OFF'
          - package: Glfw
            with_whatscanvas: 'ON'

    steps:
      - name: Checkout clean release source
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Verify clean recursive checkout
        shell: pwsh
        run: |
          $worktree = @(git status --porcelain=v1 --untracked-files=all)
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect the WhatsUI worktree."
          }
          if ($worktree.Count -ne 0) {
            throw "Release checkout is dirty:`n$($worktree -join "`n")"
          }

          $submodules = @(git submodule status --recursive)
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect recursive submodules."
          }
          $invalidSubmodules = @($submodules | Where-Object { $_ -match '^[+\-U]' })
          if ($invalidSubmodules.Count -ne 0) {
            throw "Submodules are uninitialized, conflicted, or not at their pinned revisions:`n$($invalidSubmodules -join "`n")"
          }

      - name: Validate Release ${{ matrix.package }} package
        shell: pwsh
        run: |
          function Assert-NativeSuccess([string] $stage) {
            if ($LASTEXITCODE -ne 0) {
              throw "$stage failed with exit code $LASTEXITCODE."
            }
          }

          $package = '${{ matrix.package }}'
          $withWhatsCanvas = '${{ matrix.with_whatscanvas }}'
          $packageSlug = $package.ToLowerInvariant()
          $releaseRoot = Join-Path $env:RUNNER_TEMP "whatsui-release-package-$packageSlug"
          cmake -E remove_directory "$releaseRoot"
          Assert-NativeSuccess "Cleaning the release-package workspace"
          cmake -E make_directory "$releaseRoot"
          Assert-NativeSuccess "Creating the release-package workspace"

          $packageBuild = Join-Path $releaseRoot "package-build"
          $packagePrefix = Join-Path $releaseRoot "package-prefix"
          $consumerBuild = Join-Path $releaseRoot "consumer-build"
          $configureArguments = @(
            '-S', '.', '-B', $packageBuild,
            "-DWHATSUI_WITH_WHATSCANVAS=$withWhatsCanvas",
            '-DWHATSUI_BUILD_TESTS=OFF',
            '-DWHATSUI_BUILD_EXAMPLES=OFF',
            '-DWHATSUI_INSTALL=ON',
            "-DCMAKE_INSTALL_PREFIX=$packagePrefix"
          )
          if ($withWhatsCanvas -eq 'ON') {
            $configureArguments += @(
              '-DBUILD_TESTING=OFF',
              '-DWHATSCANVAS_BUILD_DEMO=OFF',
              '-DWHATSCANVAS_BUILD_BENCHMARKS=OFF'
            )
          }

          & cmake @configureArguments
          Assert-NativeSuccess "Configuring the $package package"
          cmake --build "$packageBuild" --config Release
          Assert-NativeSuccess "Building the $package package"
          cmake --install "$packageBuild" --config Release
          Assert-NativeSuccess "Installing the $package package"
          cmake -S tests/package_consumer -B "$consumerBuild" `
            "-DCMAKE_PREFIX_PATH=$packagePrefix" `
            "-DWHATSUI_PACKAGE_TARGET=$package"
          Assert-NativeSuccess "Configuring the external $package consumer"
          cmake --build "$consumerBuild" --config Release
          Assert-NativeSuccess "Building the external $package consumer"
          $consumerExecutable = Join-Path $consumerBuild "Release\whatsui_consumer_smoke.exe"
          if (-not (Test-Path -LiteralPath $consumerExecutable -PathType Leaf)) {
            throw "$package consumer executable was not produced: $consumerExecutable"
          }
          & "$consumerExecutable"
          Assert-NativeSuccess "Running the external $package consumer"

      - name: Verify release validation did not modify sources
        if: always()
        shell: pwsh
        run: |
          $worktree = @(git status --porcelain=v1 --untracked-files=all)
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect the WhatsUI worktree after package validation."
          }
          if ($worktree.Count -ne 0) {
            throw "Release validation modified the checkout:`n$($worktree -join "`n")"
          }

          $submodules = @(git submodule status --recursive)
          if ($LASTEXITCODE -ne 0) {
            throw "Could not inspect recursive submodules after package validation."
          }
          $invalidSubmodules = @($submodules | Where-Object { $_ -match '^[+\-U]' })
          if ($invalidSubmodules.Count -ne 0) {
            throw "Release validation changed recursive submodule revisions:`n$($invalidSubmodules -join "`n")"
          }

  clang-asan-ubsan:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
      ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Clang ASan and UBSan build
        run: cmake -S . -B build-sanitizers -DCMAKE_BUILD_TYPE=Debug -DWHATSUI_ENABLE_SANITIZERS=ON

      - name: Build Clang ASan and UBSan targets
        run: cmake --build build-sanitizers --parallel

      - name: Run Clang ASan and UBSan tests
        run: ctest --test-dir build-sanitizers --output-on-failure

  whatscanvas:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: integration-build
            configure_args: -DWHATSUI_WITH_WHATSCANVAS=ON -DWHATSUI_BUILD_TESTS=OFF
            test_regex: ''
          - name: software-visual-regression
            configure_args: -DWHATSUI_WITH_WHATSCANVAS=ON -DWHATSUI_BUILD_TESTS=ON -DWHATSUI_BUILD_EXAMPLES=ON
            # Quote the alternation for PowerShell: an unquoted | becomes a
            # pipeline before CTest receives its regular expression.
            test_regex: -R '^whatsui_(todo_visual_regression|settings_reference_capture)$'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure WhatsCanvas-enabled build (${{ matrix.name }})
        run: cmake -S . -B build-wsc ${{ matrix.configure_args }}

      - name: Build WhatsCanvas-enabled target
        run: cmake --build build-wsc --config Debug

      - name: Run Software visual regression
        if: matrix.test_regex != ''
        run: ctest --test-dir build-wsc -C Debug --output-on-failure ${{ matrix.test_regex }}

      - name: Run Windows native interaction and DPI smoke
        if: matrix.name == 'software-visual-regression' && always()
        run: ctest --test-dir build-wsc -C Debug --output-on-failure -R '^whatsui_(glfw_resize_tests|todo_native_perf_smoke|todo_ui_interaction_smoke_tests|text_shaping_tests)$'

      # Same-run image invariants catch broken state transitions without
      # treating machine-specific ClearType pixels as portable goldens.
      # Preserve the responsive screenshots so a reviewer can also judge
      # composition, hierarchy, and clipping in the actual output.
      - name: Capture responsive Todo review set
        if: matrix.name == 'software-visual-regression' && always()
        run: ctest --test-dir build-wsc -C Debug --output-on-failure -R ^whatsui_todo_visual_review$

      - name: Upload Todo visual review
        if: matrix.name == 'software-visual-regression' && always()
        uses: actions/upload-artifact@v4
        with:
          name: todo-visual-review
          path: build-wsc/tests/todo_visual_review
          if-no-files-found: warn
